<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org"  th:replace="~{base::layout(~{::section},'signup-bg')}">
<head>
	<meta charset="UTF-8" />
	<title>Sign Up Page</title>
</head>
<body>
<section>
	<div class="container">
		<div class="row">
			<div class="col-md-6 offset-md-3">
			<div class="my-card">
			<!-- <div th:if="${session.message}" th:classappend="${session.message.type}" class="alert" role="alert"> -->
			<div th:if="${message}" th:classappend="${message.type}" class="alert" role="alert">
           <!--  <p th:text="${session.message.content}"></p> -->
            <p th:text="${message.content}"></p>
           <!--  <th:block th:text="${@sessionHelper.removeMessageFromSession()}"></th:block> -->
           <!--  <th:block th:text="${#session.removeAttribute('message')}"></th:block> -->
</div>
			<div class="container text-center" style="background:#FFFFFF;">
			<img style="width:40px;" th:src="@{/image/membership.png}" alt="" />
			</div>
			<h1 class="text-center">Register Here !!</h1>
			
			<form novalidate="novalidate" action="" th:action="@{do_register}" method="post" th:object="${user}">
			
			<!-- name field -->
			
			<div class="form-group">
			
    <label for="exampleInputEmail1">Your Name</label>
    
    <input name="name"
      type="text"
     class="form-control" 
     th:classappend="${#fields.hasErrors('name')? 'is-invalid' : ''} "
     id="name_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required
     th:value="${user.name}">
      <div  th:each="e : ${#fields.errors('name')}" th:text="${e}" class="invalid-feedback">
      </div>
    
  </div>
			<!-- email field -->
			
			<div class="form-group">
			
    <label for="exampleInputEmail1">Your Email</label>
    
    <input name="email"
     type="email"
     class="form-control" 
     th:classappend="${#fields.hasErrors('email')? 'is-invalid' : ''} "
     id="email_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required
      th:value="${user.email}"
      >
       <div  th:each="e : ${#fields.errors('email')}" th:text="${e}" class="invalid-feedback">
      </div>
    
  </div>
			<!-- password field -->
			
			<div class="form-group">
			
    <label for="exampleInputEmail1">Your Password</label>
    
    <input name="password"
      type="password"
     class="form-control" 
      th:classappend="${#fields.hasErrors('password')? 'is-invalid' : ''} "
     id="password_field" 
     aria-describedby="emailHelp"
     placeholder="Enter here"
     required>
     <div  th:each="e : ${#fields.errors('password')}" th:text="${e}" class="invalid-feedback">
      </div>
  </div>
  
  
  <!-- about field -->
  
  <div class="form-group">
  
  <textarea name="about"  th:text="${user.about}" placeholder="Enter about yourself" rows="3" class="form-control"></textarea>
  
  </div>
  
 
  <!-- terms and condition agreement -->
  
  <div class="form-group form-check text-center">  
  
  <input name="agreement"
            type="checkbox"
           class="form-check-input"
           id="agreement" />
           <label for="agreement">Accept terms and conditions</label>
  
  </div>
  
  <div class="container text-center" style="background:#FFFFFF;">
  <button class="btn bg-primary text-white">Submit</button>
  <button class="btn btn-warning text-white">Reset</button>
  </div>
			
			
</form>
			
			
	</div>
	</div>
	</div>
	</div>
	</section>
</body>
