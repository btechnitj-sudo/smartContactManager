<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section},'show-contact-bg')}">
<head>
	<meta charset="UTF-8" />
	<title>Contact show page</title>
</head>
<body>
<section>
	<div class="card mr-3 ml-3">
	 <div class="card-body">
	 <h1 class="text-center"> Your Contacts</h1>

   <!-- search  -->

   <div class="search-container my-3">

    <input onKeyup="searchContacts()" id="search-input" type="text" class="form-control" placeholder="search your contacts"/>

    <div class="search-result">

    <!-- result will be shown here -->
     <!-- //<h1>this is result</h1> -->
     

    </div>

   </div>

   <div class="table-responsive">
	<table class="table table-hover">
  <thead class="thead-dark">
    <tr>
      <th scope="col">#ID</th>
      <th scope="col">Name</th>
      <th scope="col">Email</th>
      <th scope="col">Phone</th>
      <th scope="col">Action</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="c :${contacts}">
      <th scope="row" th:text="${'SCMUSER'+c.cid}">1</th>
      <td >
      <img src="" class="my_profile_picture" th:src="@{'/image/'+${c.image}}" alt="profile photo"  />
      
      
      <span th:text="${c.name}"></span></td>
      
      
      <td>
      
      <a href="#" th:href="@{'/user/'+${c.cid}+'/contact'}">
      
       <span th:text="${c.email}"></span>
      
       </a>
       
       </td>
      
      
      <td  th:text="${c.phone}">@mdo</td>
      
      
      <td>
      
     <!--  Delete Button -->
     
     <!--  <a th:href="@{'/user/delete/'+${c.cid}}" class="btn btn-danger btn-sm">Delete</a> -->
     <!-- <a href="#" th:onclick="|deleteContact(${c.cid})|" class="btn btn-danger btn-sm">Delete</a> -->
     
     <form th:action="@{'/user/delete/' + ${c.cid}}" 
      method="post" 
      class="d-inline delete-form">
    
    <button type="submit"  class="btn btn-danger btn-sm">Delete</button>
    </form>
     
     <form method="GET" th:action="@{'/user/update-contact/'+${c.cid}}" class="mt-2">
      <button type="submit" class="btn btn-primary btn-sm">Update</button>
      
      
      </form>
      </td>
    </tr>
   
  </tbody>
</table>  
</div>
<!-- pagination -->

<nav aria-label="Page navigation example">
  <ul class="pagination">
    <li th:if="${currentPage !=0}" class="page-item"><a class="page-link" href="#" th:href="@{'/user/show_contacts/'+${currentPage-1}}">Previous</a></li>
    
    <li th:classappend="${currentPage==i-1 ? 'active':''}" th:each="i :${#numbers.sequence(1,totalPages)}" class="page-item"><a class="page-link" href="#" th:href="@{'/user/show_contacts/'+${i-1}}"><span th:text="${i}"></span></a></li>
    
    <li th:if="${currentPage+1 != totalPages}"class="page-item"><a class="page-link" href="#" th:href="@{'/user/show_contacts/'+${currentPage+1}}">Next</a></li>
    
  </ul>
</nav> 
	   
	   
	   
	 </div>
	
	</div>

  <script>
$(document).ready(()=>{
	$('.item').removeClass('active');
	$('#contacts-link').addClass('active')
})

</script>
	</section>
</body>
</html>
