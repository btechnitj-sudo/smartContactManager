<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{normal/base::layout(~{::section},'dashboard-bg')}">
  
  <!-- Define the content for the layout's "content" placeholder -->
  <section th:fragment="section">
    <!-- Page-specific content starts here -->
    <div class="container">
      <h1>Settings</h1>
      
      <!-- Profile Update Form -->
      <form th:action="@{/user/update-profile}" method="post" class="mb-4">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" class="form-control" th:value="${user.name}">
        </div>
        <div class="form-group">
          <label for="about">About</label>
          <textarea id="about" name="about" class="form-control" rows="3" th:text="${user.about}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
      </form>
      
      <!-- Change Password Form -->
      <form th:action="@{/user/change-password}" method="post">
        <div class="form-group">
          <label for="oldPassword">Old Password</label>
          <input type="password" id="oldPassword" name="oldPassword" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
      </form>
    </div>
    <!-- Page-specific content ends here -->
  </section>
  
</html>
