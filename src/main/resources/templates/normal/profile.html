<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section},'profile-bg')}">
<head>
	<meta charset="UTF-8" />
	<title>User Profile/title>
</head>
<body>
<section>
	 <div class="contianer">
	 <div class="card">
<div class="card-body">
<div class="container text-center">
<img src="" style="height: 150px; width: 150px;"  class="my_profile_picture" th:src="@{'/image/'+${user.imageUrl}}" alt="profile photo"  />
</div>
<h1 class="text-center mt-2" th:text="${user.name}"></h1>

	 <table class="table text-center">
  <thead>
    <tr>
      <th scope="col">#USERID</th>
      <th scope="col">SCMUSER<span th:text="${user.id}"></span></th>
      
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">Email</th>
      <td><span th:text="${user.email}"></span></td>
      
    </tr>
	
	 <tr>
      <th scope="row">Role</th>
      <td><span th:text="${user.role}"></span></td>
      
    </tr>
    
     <tr>
      <th scope="row">Account Active</th>
      <td><span th:text="${user.enabled}"></span></td>
      
    </tr>
     <tr>
      <th scope="row">About You</th>
      <td><span th:text="${user.about}"></span></td>
      
    </tr>
     <!-- <tr>
      <th scope="row">Account Active</th>
      <td><span th:text="${user.enabled}"></span></td>
      
    </tr> -->
    </tbody>
     </table>



</div>


</div>
	 
	 </div>
	</section>
</body>
</html>
