<!doctype html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section},'contact-bg')}">
<head>
	<meta charset="UTF-8" />
	<title>Add Contact Form </title>
</head>
<body>
	<section>
	<div class="card mr-4">
	
	<div class="card-body">
	
	<h1 class="text-center"> Add Contact</h1>
	<div class="container-fluid mt-1">
	 <div class="row">
	 <div class="col-md-10 offset-md-1">
	<form action="#" th:object="${contact}" 
	enctype="multipart/form-data"
	method="POST"
	th:action="@{/user/process-contact}"
	
	 class="mt-2">
	 
	 
	 <!-- First Name -->
	 <div class="input-group">
	 
	 <div class="input-group-prepend">
	  
	  <div class="input-group-text">
	  
	  <i class="fa fa-plus"></i>
	 
	 </div>
	 
	 </div>
	 
	 <input required type="text" id="firstName" name="name" placeholder="Enter Name here" class="form-control" />
	 
	 
	 
	 </div>
	 <!-- Second Name -->
	 <div class="input-group mt-3">
	 
	 <div class="input-group-prepend">
	  
	  <div class="input-group-text">
	  
	  <i class="fas fa-user-alt"></i>
	 
	 </div>
	 
	 </div>
	 
	 <input required type="text" id="nickName" name="nickName" placeholder="Enter Nick  Name here" class="form-control" />
	 
	 
	 
	 </div>
	 <!-- Phone field -->
	 <div class="input-group mt-3">
	 
	 <div class="input-group-prepend">
	  
	  <div class="input-group-text">
	  
	  <i class="fa fa-phone"></i>
	 
	 </div>
	 
	 </div>
	 
	 <input required min="10"  type="number" id="phone" name="phone" placeholder="Enter Phone No here" class="form-control" />
	 
	 
	 
	 </div>
	 
	 <!-- Email -->
	 <div class="input-group mt-3">
	 
	 <div class="input-group-prepend">
	  
	  <div class="input-group-text">
	  
	  <i class="fa-solid fa-solidLarge fa-at">‌</i>
	 
	 </div>
	 
	 </div>
	 
	 <input required type="email" id="email" name="email" placeholder="Enter Email here" class="form-control" />
	 
	 
	 
	 </div>
	 
	 <!-- Work -->
	 <div class="input-group mt-3">
	 
	 <div class="input-group-prepend">
	  
	  <div class="input-group-text">
	  
	  <i class="fa fa-briefcase">‌</i>
	 
	 </div>
	 
	 </div>
	 
	 <input required type="text" id="work" name="work" placeholder="Enter Work here" class="form-control" />
	 
	 
	 
	 </div>
	 
	 
	 <!-- Contact Description -->
	 
	 <div class="form-group mt-3">  
	 
	 <textarea id="tiny" placeholder="Enter contact description"  name="description" class="form-control"  rows="4"></textarea>
	 
	 
	 </div>
	 
	 <!-- Contact Image -->
	 
	 <div class="custom-file">
	 <input type="file" name="profile-image"/>	 
	 
	 </div>
	 
	 <div class="container text-center">
	 
	 <button class="btn btn-outline-primary">Save Contact</button></div>
	 </form>
	
	
	
	
	</div>
	
	</div>
	</div>
	</div>
	</div>

	
<script src="https://cdn.tiny.cloud/1/5g8jbs2i4xkc2ovgv0bep2stjycspe4peakovow2mo5iucon/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>
	<script>
  tinymce.init({
    selector: 'textarea#tiny'
  });
</script>
	
<script>
$(document).ready(()=>{
	$('.item').removeClass('active');
	$('#add-link').addClass('active')
})

</script>
	</section>
</body>
</html>
