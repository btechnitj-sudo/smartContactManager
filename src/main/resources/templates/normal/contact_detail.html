<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section},'show-contact-details-bg')}">
<head>
	<meta charset="UTF-8" />
	<title>Contact Details</title>
</head>
<body>
<section>
	<div class="card mr-3 ml-3 " th:if="${contact}">
	<div class="card-body" >
	<div class="container text-center">
	
	<!-- Show Profile Picture -->
	<img src="" style="height: 150px; width: 150px;"  class="my_profile_picture" th:src="@{'/image/'+${contact.image}}" alt="profile photo"  />
	
	<!-- Show Name and NickName -->
	<h3 class="mt-3"><span th:text="${contact.name}"></span> (<span th:text="${contact.nickName}"></span>)</h3>
	
	<table class="table">
  <thead>
    <tr>
      <th scope="col">#ID</th>
      <th scope="col">SCMUSER<span th:text="${contact.cid}"></span></th>
      
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">Email</th>
      <td><span th:text="${contact.email}"></span></td>
      
    </tr>
	
	 <tr>
      <th scope="row">Phone</th>
      <td><span th:text="${contact.phone}"></span></td>
      
    </tr>
    
     <tr>
      <th scope="row">Work</th>
      <td><span th:text="${contact.work}"></span></td>
      
    </tr>
    </tbody>
     </table>
    <div class="description">
    
    <th:block th:utext="${contact.description}"></th:block>
    
    </div>
    
    <div class="container mt-3">
    
    <!-- DELETE BUTTON WITH POST (SAFE & PROFESSIONAL) -->
    
<form th:action="@{'/user/delete/' + ${contact.cid}}" 
      method="post" 
      class="d-inline delete-form">
    
  
   <button type="submit"  class="btn btn-danger btn-sm">Delete</button>
   
   <!-- Use For GetMapping -->
    <!--  <button type="submit" th:onclick="|deleteContact(${contact.cid})|" class="btn btn-danger btn-sm">Delete</button> -->
    </form>
    
     <form method="GET" th:action="@{'/user/update-contact/'+${contact.cid}}" class="mt-2">
      <button type="submit" class="btn btn-primary btn-sm">Update</button>
      
      
      </form>
     
      </div>
   
	</div>
	
	</div>
	
	
	
	</div>
	
	<h1 class="text-center p-3 bg-danger text-white" th:unless="${contact}"> You don't have permission to see this contact</h1>
	
	</section>
</body>
</html>
